<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="unsnooze logo">
  <!-- unsnooze mark: a crescent moon cradling the terminal prompt, z's
       drifting away — asleep until the prompt wakes. Palette matches the
       site/README: #0d1117 tile, #e6edf3 moon, #f59e0b prompt. -->
  <defs>
    <mask id="crescent-cut">
      <rect width="128" height="128" fill="#fff"/>
      <circle cx="83" cy="49" r="34" fill="#000"/>
    </mask>
  </defs>

  <!-- tile (subtle border so the mark holds up on light backgrounds) -->
  <rect x="1" y="1" width="126" height="126" rx="28" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <!-- moon -->
  <circle cx="60" cy="68" r="38" mask="url(#crescent-cut)" fill="#e6edf3"/>

  <!-- the prompt, waking inside the crescent's hollow -->
  <path d="M70 40 L88 54 L70 68" fill="none" stroke="#f59e0b" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- z z drifting off to sleep -->
  <path d="M96 34 h10 l-10 10 h10" fill="none" stroke="#8b949e" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M110 18 h7 l-7 7 h7" fill="none" stroke="#8b949e" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- two stars from the site's sky -->
  <circle cx="28" cy="34" r="2" fill="#e6edf3" opacity="0.75"/>
  <circle cx="40" cy="22" r="1.4" fill="#e6edf3" opacity="0.5"/>
</svg>
