<svg width="880" height="420" viewBox="0 0 880 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="animated demo: limit banners detected in two sessions, unsnooze waits for the reset, then wakes both — good morning, the work is done">
  <defs>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#090c10"/>
    </linearGradient>
    <radialGradient id="tvign" cx="0.5" cy="0.45" r="0.85">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
    <filter id="tsoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="typeClip">
      <rect x="34" y="150" width="0" height="28">
        <animate attributeName="width" values="0;0;190;190" keyTimes="0;0.233;0.317;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- window shadow + body -->
  <rect x="16" y="20" width="852" height="388" rx="16" fill="#000000" opacity="0.55" filter="url(#tsoft)"/>
  <rect x="10" y="10" width="860" height="392" rx="14" fill="url(#term)" stroke="#30363d" stroke-width="2"/>
  <!-- title bar -->
  <path d="M11 24 a13 13 0 0 1 13-13 h832 a13 13 0 0 1 13 13 v31 h-858 z" fill="#161b22"/>
  <circle cx="38" cy="33" r="7" fill="#ff5f57"/>
  <circle cx="62" cy="33" r="7" fill="#febc2e"/>
  <circle cx="86" cy="33" r="7" fill="#28c840"/>
  <text x="440" y="39" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14" fill="#8b949e">tmux · 3 agent sessions · unsnooze watching</text>

  <!-- log lines: 12s loop, each fades in at its own moment, all reset together -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="16.5">

    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.03;0.97;1" dur="12s" begin="0.5s" repeatCount="indefinite"/>
      <text x="34" y="94" fill="#f87171">⚠ claude · You've hit your 5-hour limit — resets 3am</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.03;0.97;1" dur="12s" begin="1.6s" repeatCount="indefinite"/>
      <text x="34" y="132" fill="#f87171">■ codex · You've hit your usage limit. Try again at 3:00 AM.</text>
    </g>

    <!-- typed command: clip width animates like a typewriter -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.01;0.97;1" dur="12s" begin="2.8s" repeatCount="indefinite"/>
      <g clip-path="url(#typeClip)">
        <text x="34" y="172" fill="#e6edf3">❯ unsnooze status</text>
      </g>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.03;0.97;1" dur="12s" begin="4.2s" repeatCount="indefinite"/>
      <text x="34" y="210" fill="#8b949e">[STOPPED] claude · ~/work/api      resets 3:00 AM (4h 12m)</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.03;0.97;1" dur="12s" begin="4.7s" repeatCount="indefinite"/>
      <text x="34" y="240" fill="#8b949e">[STOPPED] codex  · ~/work/webapp   resets 3:00 AM (4h 12m)</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.03;0.97;1" dur="12s" begin="6s" repeatCount="indefinite"/>
      <text x="34" y="278" fill="#8b949e">…you go to sleep. unsnooze doesn't.  ⏰ 3:00 AM —</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.03;0.97;1" dur="12s" begin="7.6s" repeatCount="indefinite"/>
      <text x="34" y="316" fill="#e3b341" filter="url(#tsoft)" opacity="0.55">→ waking claude in pane %1 · reopening codex: codex resume --last "continue"</text>
      <text x="34" y="316" fill="#e3b341">→ waking claude in pane %1 · reopening codex: codex resume --last "continue"</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.03;0.97;1" dur="12s" begin="9.2s" repeatCount="indefinite"/>
      <text x="34" y="354" fill="#4ade80" filter="url(#tsoft)" opacity="0.55">✔ all sessions verified running — good morning, the work is done</text>
      <text x="34" y="354" fill="#4ade80">✔ all sessions verified running — good morning, the work is done</text>
    </g>
  </g>

  <rect x="10" y="10" width="860" height="392" rx="14" fill="url(#tvign)"/>
</svg>
